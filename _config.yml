# ===================================================================
# 站点基本信息
# ===================================================================
title:           南陔
tagline:         An EE-born Recommender Engineer
description: >-
  从模拟电路的一颗三极管，到推荐系统里的一次点击 —— 都是在追同一件事：让信号找到对的人。
url:             "https://Lukad77.github.io"
baseurl:         ""
lang:            zh-CN
timezone:        Asia/Shanghai

# ===================================================================
# 主题：hydejack（免费版，通过 remote_theme 注入）
# ===================================================================
remote_theme:    hydecorp/hydejack@v9.2.1
theme_color:     "#a86bff"    # 主色，取自你原 index.html 的紫

# hydejack 相关配置
# accent_image 是 hydejack 侧栏顶部的背景图 URL（字符串，可省略）
accent_color:    "#a86bff"

# 侧栏内容开关
menu:
  - title:       博客
    url:         /
  - title:       关于
    url:         /about/
  - title:       归档
    url:         /archive/

# 分类聚合页展示方式：使用自定义 layout categories
legal:
  - title:       LICENSE
    url:         /LICENSE

# 复制/摘录来源展示
copy_this_paste_that: false

# ===================================================================
# 作者
# ===================================================================
author:
  name:          南陔
  email:         1041653585@qq.com
  about: >-
    NWU EE 硕士出身，现在做推荐系统研发。
    喜欢把复杂的东西拆开看：电路、模型、战术、代码，都一样。
  picture:       /assets/img/avatar.png
  social:
    github:      Lukad77
    email:       1041653585@qq.com

# ===================================================================
# 分页 & 归档
# ===================================================================
paginate:        20
paginate_path:   /page/:num/

permalink:       /:year/:month/:day/:title/

# ===================================================================
# 构建配置
# ===================================================================
plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-redirect-from
  - jekyll-include-cache
  - jekyll-relative-links

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - _backup
  - README.md

defaults:
  - scope:
      path:      ""
      type:      posts
    values:
      layout:    post
      author:    南陔
      comments:  false
