---
layout: default
---

{{ content }}

{% if content contains 'language-mermaid' %}
<script>
  (function() {
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/mermaid@11.4.1/dist/mermaid.min.js';
    s.defer = true;
    s.onload = function() {
      mermaid.initialize({ startOnLoad: false, theme: 'default', fontSize: 16 });
      mermaid.run({ querySelector: 'code.language-mermaid' }).then(function() {
        document.querySelectorAll('code.language-mermaid svg').forEach(function(svg) {
          svg.style.maxWidth = '100%';
          svg.style.height = 'auto';
        });
      });
    };
    document.head.appendChild(s);
  })();
</script>
{% endif %}
